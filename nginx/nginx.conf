events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;

  # Generous timeouts — SSE streams from /api/v1/research can run for 60–90 s
  proxy_read_timeout  300s;
  proxy_send_timeout  300s;
  proxy_connect_timeout 10s;

  # Gzip for text assets from the Next.js frontend
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  upstream backend  { server backend:8000;  }
  upstream frontend { server frontend:3000; }

  server {
    listen 80;
    server_name _;

    # ── FastAPI — API + health ──────────────────────────────────
    location /api/ {
      proxy_pass          http://backend;
      proxy_http_version  1.1;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;

      # Critical for SSE: disable all buffering so events reach the client immediately
      proxy_buffering           off;
      proxy_cache               off;
      proxy_set_header          Connection '';
      chunked_transfer_encoding on;
      add_header                X-Accel-Buffering no;
    }

    location = /health {
      proxy_pass         http://backend/health;
      proxy_http_version 1.1;
      access_log         off;
    }

    # ── Next.js frontend — everything else ──────────────────────
    location /_next/static/ {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      # Static chunks are immutable — cache aggressively at the CDN / browser
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host       $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}

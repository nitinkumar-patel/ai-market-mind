version: "3.9"

# ─── MarketMind — production-ready stack ────────────────────────────────────
#
# Default (OpenAI):   docker compose up --build
# With Ollama:        docker compose --profile ollama up --build
#
# Required env (copy env-default → .env and fill in):
#   POSTGRES_PASSWORD, OPENAI_API_KEY, TAVILY_API_KEY
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app_net:
    driver: bridge

services:

  # ── Postgres + pgvector ───────────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: marketmind-db
    restart: always
    networks:
      - app_net
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-marketmind}
      POSTGRES_USER:     ${POSTGRES_USER:-marketmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketmind} -d ${POSTGRES_DB:-marketmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama — local LLM (opt-in: docker compose --profile ollama up) ───────
  ollama:
    image: ollama/ollama:latest
    container_name: marketmind-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    networks:
      - app_net
    volumes:
      - ollama_models:/root/.ollama
    # First boot: docker compose exec ollama ollama pull llama3.1

  # ── FastAPI + LangGraph backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketmind-backend
    restart: always
    networks:
      - app_net
    environment:
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-marketmind}
      POSTGRES_USER:     ${POSTGRES_USER:-marketmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      TAVILY_API_KEY:    ${TAVILY_API_KEY:-}
      ENVIRONMENT:       ${ENVIRONMENT:-prod}
      LLM_PROVIDER:      ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-llama3.1}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://backend:8000
    container_name: marketmind-frontend
    restart: always
    networks:
      - app_net
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Nginx — single public entry point ────────────────────────────────────
  #   /api/*  → backend:8000   (SSE buffering disabled)
  #   /*      → frontend:3000
  nginx:
    image: nginx:1.27-alpine
    container_name: marketmind-nginx
    restart: always
    networks:
      - app_net
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  pgdata:
  ollama_models:
